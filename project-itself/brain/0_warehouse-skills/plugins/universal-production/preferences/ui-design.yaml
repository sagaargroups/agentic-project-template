# UI Design Preferences

# Brand Colors
brand:
  primary: "#F97316"        # Orange-500 (your main brand color)
  secondary: "#1F2937"      # Gray-800
  accent: "#3B82F6"         # Blue-500
  success: "#10B981"        # Green-500
  warning: "#F59E0B"        # Amber-500
  error: "#EF4444"          # Red-500
  info: "#06B6D4"           # Cyan-500

# Theme Settings
theme:
  default: "system"         # light | dark | system
  darkBackground: "#121212"
  lightBackground: "#FAFAFA"
  darkSurface: "#1E1E1E"
  lightSurface: "#FFFFFF"

# Typography
fonts:
  heading: "Inter"
  body: "Inter"
  mono: "JetBrains Mono"
  sizes:
    xs: "0.75rem"
    sm: "0.875rem"
    base: "1rem"
    lg: "1.125rem"
    xl: "1.25rem"
    "2xl": "1.5rem"
    "3xl": "1.875rem"

# Border Radius
borderRadius:
  sm: "0.25rem"
  md: "0.375rem"
  lg: "0.5rem"
  xl: "0.75rem"
  full: "9999px"

# Spacing (follows Tailwind scale)
spacing:
  unit: "0.25rem"           # 4px base unit

# Shadows
shadows:
  sm: "0 1px 2px rgba(0,0,0,0.05)"
  md: "0 4px 6px rgba(0,0,0,0.1)"
  lg: "0 10px 15px rgba(0,0,0,0.1)"

# Animation
animation:
  duration: "200ms"
  easing: "ease-in-out"
