# Project Configuration

# Architecture
architecture: modular-monolith   # modular-monolith | microservices | hybrid

# Folder Structure
folders:
  products: src/products         # Product modules
  domains: src/domains           # Domain modules (admin, developer, etc.)
  shared: src/shared             # Shared utilities
  platform: src/platform         # Platform APIs (identity, billing)
  app: src/app                   # Next.js App Router

# API Configuration
api:
  style: restful                 # restful | graphql | trpc
  version: v1
  basePath: /api
  responseFormat: unified        # { success, data, error }
  authentication: cookie         # cookie | jwt | session

# Database
database:
  orm: drizzle
  provider: postgres
  connectionPoolSize: 10
  migrations: auto               # auto | manual
  seedData: true

# Authentication
auth:
  provider: custom               # custom | auth-js | clerk
  sessionDuration: 7d
  refreshToken: true
  mfa: optional

# Deployment
deployment:
  platform: vercel
  regions:
    - iad1
  env:
    - development
    - staging
    - production

# Caching
caching:
  strategy: stale-while-revalidate
  defaultTtl: 60                 # seconds
  useCdn: true

# Monitoring
monitoring:
  errorTracking: true
  analytics: true
  logging: structured

# Feature Flags
featureFlags:
  enabled: true
  provider: environment          # environment | launchdarkly | custom
